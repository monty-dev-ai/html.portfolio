<!-- Example Google Maps Link -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
  * {
    box-sizing: border-box;
    margin: 0; /* Adding this here resets everything globally */
    padding: 0;
  }

  body {
    background: linear-gradient(to left, yellow, purple);
    /* Remove justify-self and align-items from here */
    width: 100%;
    min-height: 100vh;
  }

  /* Add this to center your text and list items */
  h1, h2, h3, ul, a {
    margin-left: 20px; 
    /* Gives your text a little breathing room from the left edge */
  }

  .container {
    background-color: pink;
    padding: 20px 0; /* Vertical padding only */
    width: 100%;     /* Spans full width */
    display: flex;   /* This helps center the cake image inside the pink bar */
    justify-content: center;
    margin: 20px 0;  /* Adds some space above and below the pink bar */
    box-sizing: border-box;
  }

  img{
    border: 5px solid pink; 
    border-radius: 50px;
    cursor: pointer;
  }
  img:hover{
    border: 5px solid rgb(238, 55, 183); 
  }
  .center{
    display: flex;
    justify-content: center;
  }
  a{
    color: rgb(255, 189, 200);
  }
  ul{
      text-align: left;
    display: flex;
    flex-direction: column;
    align-items: center;
    list-style-position: outside;
    padding-left: 1.5em;
    margin: 0;

  }
  li{
    width: fit-content;
  }
</style>
    </style>
  </head>
  <body>
    <h1 class="center">It's My Birthday!</h1>
    <h2 class="center">On the 27th August</h2>
    <div class="container">
      <img
        src="https://raw.githubusercontent.com/appbrewery/webdev/main/birthday-cake3.4.jpeg"
        alt="Image of a birthday cake"
      />
    </div>
    <h3 class="center">What to bring:</h3>
    <ul class="center">
      <li>Baloons (I love baloons)</li>
      <li>Cake (I'm really good at eating)</li>
      <li>An appetite (There will be lots of food)</li>
    </ul>
    <h3 class="center">This is where you need to go:</h3>
    <a
      href="https://www.google.com/maps/@35.7040744,139.5577317,3a,75y,289.6h,87.01t,0.72r/data=!3m6!1e1!3m4!1sgT28ssf0BB2LxZ63JNcL1w!2e0!7i13312!8i6656" class="center"
      >Google Map link</a
    >
  </body>
</html>
